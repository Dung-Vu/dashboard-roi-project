services:
  dashboard:
    build:
      context: .
    image: dashboard-roi-project:local
    container_name: dashboard-roi-project
    env_file:
      - .env
    environment:
      PORT: "${PORT:-5056}"
      DEBUG: "0"
      CACHE_DB_PATH: "/app/data/cache.db"
    volumes:
      - dashboard_cache:/app/data
    ports:
      - "${PORT:-5056}:${PORT:-5056}"
    networks:
      - shared-tunnel
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys; s=socket.socket(); s.settimeout(5); s.connect(('localhost', int('${PORT:-5056}'))); s.close(); print('OK')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  dashboard_cache:

networks:
  shared-tunnel:
    name: bonario-shared-tunnel
    external: true
